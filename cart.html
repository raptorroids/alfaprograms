<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Urban Marketplace</title>
    <meta name="description" content="Review your items and complete your purchase on Urban Marketplace. Secure checkout with multiple payment options.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Core Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <!-- Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .cart-item {
            transition: all 0.3s ease;
        }
        
        .cart-item:hover {
            background-color: #f9fafb;
        }
        
        .quantity-input {
            -moz-appearance: textfield;
        }
        
        .quantity-input::-webkit-outer-spin-button,
        .quantity-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .checkout-step {
            display: none;
        }
        
        .checkout-step.active {
            display: block;
        }
        
        .step-indicator {
            position: relative;
        }
        
        .step-indicator.completed {
            background-color: #10b981;
            color: white;
        }
        
        .step-indicator.active {
            background-color: #f97316;
            color: white;
        }
        
        .notification {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .payment-method {
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .payment-method:hover {
            border-color: #f97316;
        }
        
        .payment-method.selected {
            border-color: #f97316;
            background-color: #fff7ed;
        }
        
        .promo-input {
            border-right: none;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        
        .promo-button {
            border-left: none;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .success-animation {
            animation: successPulse 2s ease-in-out;
        }
        
        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <img src="resources/hero/marketplace-logo.png" alt="Urban Marketplace" class="h-8 w-auto">
                    <span class="ml-2 text-xl font-bold text-gray-900">Urban Marketplace</span>
                </div>
                
                <!-- Navigation Links -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-orange-600 font-medium transition-colors">Home</a>
                    <a href="browse.html" class="text-gray-700 hover:text-orange-600 font-medium transition-colors">Browse</a>
                    <a href="sell.html" class="text-gray-700 hover:text-orange-600 font-medium transition-colors">Sell</a>
                    <a href="profile.html" class="text-gray-700 hover:text-orange-600 font-medium transition-colors">Profile</a>
                </div>
                
                <!-- Mobile Menu Button -->
                <div class="md:hidden">
                    <button class="text-gray-700 hover:text-orange-600">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="bg-white py-8 border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold text-gray-900">Shopping Cart</h1>
            <p class="text-gray-600 mt-2">Review your items and complete your purchase</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Cart Content -->
            <div id="cartContent">
                <!-- Cart items will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">
                © 2024 Urban Marketplace. All rights reserved. Built with trust and security.
            </p>
        </div>
    </footer>

    <script>
        // Cart functionality
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentStep = 1;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadCartContent();
        });
        
        function loadCartContent() {
            const cartContent = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                cartContent.innerHTML = createEmptyCartHTML();
            } else {
                cartContent.innerHTML = createCartHTML();
                updateCartTotals();
            }
        }
        
        function createEmptyCartHTML() {
            return `
                <div class="empty-cart bg-white rounded-lg shadow-md">
                    <svg class="w-24 h-24 text-gray-300 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m0 0L7 13m0 0l-1.5 6M7 13l-1.5 6m0 0h9m-9 0h9"></path>
                    </svg>
                    <h2 class="text-2xl font-semibold text-gray-900 mb-4">Your cart is empty</h2>
                    <p class="text-gray-600 mb-8 max-w-md mx-auto">
                        Looks like you haven't added anything to your cart yet. Start shopping to find amazing products from our verified sellers.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <a href="browse.html" class="bg-orange-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-orange-700 transition-colors">
                            Start Shopping
                        </a>
                        <a href="index.html" class="border border-gray-300 text-gray-700 px-8 py-3 rounded-lg font-semibold hover:bg-gray-50 transition-colors">
                            Back to Home
                        </a>
                    </div>
                </div>
            `;
        }
        
        function createCartHTML() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Cart Items -->
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <h2 class="text-xl font-semibold text-gray-900 mb-6">Items in your cart</h2>
                            
                            <div class="space-y-4" id="cartItems">
                                ${cart.map(item => createCartItemHTML(item)).join('')}
                            </div>
                            
                            <div class="mt-6 pt-6 border-t">
                                <div class="flex gap-4">
                                    <input type="text" id="promoCode" placeholder="Enter promo code" 
                                           class="promo-input flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    <button onclick="applyPromoCode()" class="promo-button bg-gray-900 text-white px-6 py-2 rounded-lg font-medium hover:bg-gray-800 transition-colors">
                                        Apply
                                    </button>
                                </div>
                                <p class="text-sm text-gray-500 mt-2">Promo codes are case sensitive</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Order Summary -->
                    <div class="lg:col-span-1">
                        <div class="bg-white rounded-lg shadow-md p-6 sticky top-24">
                            <h2 class="text-xl font-semibold text-gray-900 mb-6">Order Summary</h2>
                            
                            <div class="space-y-4 mb-6">
                                <div class="flex justify-between">
                                    <span class="text-gray-600">Subtotal</span>
                                    <span id="subtotal" class="font-medium text-gray-900">$0.00</span>
                                </div>
                                
                                <div class="flex justify-between">
                                    <span class="text-gray-600">Shipping</span>
                                    <span id="shipping" class="font-medium text-gray-900">Free</span>
                                </div>
                                
                                <div class="flex justify-between" id="discountRow" style="display: none;">
                                    <span class="text-gray-600">Discount</span>
                                    <span id="discount" class="font-medium text-green-600">-$0.00</span>
                                </div>
                                
                                <div class="flex justify-between">
                                    <span class="text-gray-600">Tax</span>
                                    <span id="tax" class="font-medium text-gray-900">$0.00</span>
                                </div>
                                
                                <div class="border-t pt-4">
                                    <div class="flex justify-between">
                                        <span class="text-lg font-semibold text-gray-900">Total</span>
                                        <span id="total" class="text-lg font-bold text-gray-900">$0.00</span>
                                    </div>
                                </div>
                            </div>
                            
                            <button onclick="proceedToCheckout()" class="w-full bg-orange-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-orange-700 transition-colors mb-4">
                                Proceed to Checkout
                            </button>
                            
                            <div class="text-center">
                                <a href="browse.html" class="text-sm text-orange-600 hover:text-orange-700 font-medium">
                                    Continue Shopping
                                </a>
                            </div>
                            
                            <!-- Security Badges -->
                            <div class="mt-6 pt-6 border-t">
                                <div class="flex items-center justify-center gap-4 text-sm text-gray-600">
                                    <div class="flex items-center gap-1">
                                        <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                                        </svg>
                                        <span>SSL Secured</span>
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                        <span>Buyer Protection</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function createCartItemHTML(item) {
            return `
                <div class="cart-item flex items-center gap-4 p-4 border border-gray-200 rounded-lg">
                    <img src="${item.image}" alt="${item.name}" class="w-20 h-20 object-cover rounded-lg">
                    
                    <div class="flex-1">
                        <h3 class="font-semibold text-gray-900 mb-1">${item.name}</h3>
                        <p class="text-sm text-gray-600 mb-2">Seller: ${item.seller}</p>
                        <p class="text-sm text-gray-500">Condition: ${item.condition}</p>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" 
                                class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-full hover:bg-gray-100">
                            -
                        </button>
                        <span class="w-8 text-center font-medium">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" 
                                class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-full hover:bg-gray-100">
                            +
                        </button>
                    </div>
                    
                    <div class="text-right">
                        <p class="font-semibold text-gray-900">$${(item.price * item.quantity).toFixed(2)}</p>
                        <p class="text-sm text-gray-500">$${item.price} each</p>
                        <button onclick="removeFromCart(${item.id})" 
                                class="text-sm text-red-600 hover:text-red-700 mt-1">
                            Remove
                        </button>
                    </div>
                </div>
            `;
        }
        
        function updateQuantity(productId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            const item = cart.find(item => item.id == productId);
            if (item) {
                item.quantity = newQuantity;
                localStorage.setItem('cart', JSON.stringify(cart));
                loadCartContent();
                updateCartDisplay();
            }
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id != productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCartContent();
            updateCartDisplay();
            showNotification('Item removed from cart', 'info');
        }
        
        function updateCartTotals() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 50 ? 0 : 5.99;
            const tax = subtotal * 0.08;
            const total = subtotal + shipping + tax;
            
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }
        
        function updateCartDisplay() {
            if (window.marketplace) {
                window.marketplace.updateCartDisplay();
            }
        }
        
        function applyPromoCode() {
            const promoCode = document.getElementById('promoCode').value.trim();
            
            if (!promoCode) {
                showNotification('Please enter a promo code', 'error');
                return;
            }
            
            // Simulate promo code validation
            const validCodes = ['WELCOME10', 'SAVE20', 'FREESHIP'];
            
            if (validCodes.includes(promoCode.toUpperCase())) {
                const discountRow = document.getElementById('discountRow');
                const discount = document.getElementById('discount');
                
                let discountAmount = 0;
                if (promoCode.toUpperCase() === 'WELCOME10') {
                    discountAmount = 0.10;
                } else if (promoCode.toUpperCase() === 'SAVE20') {
                    discountAmount = 0.20;
                } else if (promoCode.toUpperCase() === 'FREESHIP') {
                    // Free shipping handled separately
                    document.getElementById('shipping').textContent = 'Free';
                    showNotification('Free shipping applied!', 'success');
                    return;
                }
                
                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const discountValue = subtotal * discountAmount;
                
                discount.textContent = `-$${discountValue.toFixed(2)}`;
                discountRow.style.display = 'flex';
                
                showNotification(`Promo code applied! ${Math.round(discountAmount * 100)}% discount`, 'success');
                updateCartTotals();
            } else {
                showNotification('Invalid promo code', 'error');
            }
        }
        
        function proceedToCheckout() {
            if (cart.length === 0) {
                showNotification('Your cart is empty', 'error');
                return;
            }
            
            // Switch to checkout view
            document.getElementById('cartContent').innerHTML = createCheckoutHTML();
        }
        
        function createCheckoutHTML() {
            return `
                <div class="max-w-4xl mx-auto">
                    <!-- Checkout Steps -->
                    <div class="flex items-center justify-center mb-8">
                        <div class="flex items-center">
                            <div class="step-indicator active flex items-center justify-center w-10 h-10 bg-orange-600 text-white rounded-full font-semibold" data-step="1">1</div>
                            <div class="w-16 h-1 bg-gray-200"></div>
                            <div class="step-indicator flex items-center justify-center w-10 h-10 bg-gray-200 text-gray-600 rounded-full font-semibold" data-step="2">2</div>
                            <div class="w-16 h-1 bg-gray-200"></div>
                            <div class="step-indicator flex items-center justify-center w-10 h-10 bg-gray-200 text-gray-600 rounded-full font-semibold" data-step="3">3</div>
                        </div>
                    </div>
                    
                    <!-- Step 1: Shipping Information -->
                    <div class="checkout-step active" id="checkoutStep1">
                        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                            <h2 class="text-xl font-semibold text-gray-900 mb-6">Shipping Information</h2>
                            <form class="space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">First Name *</label>
                                        <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Last Name *</label>
                                        <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                                    <input type="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                                    <input type="tel" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Address *</label>
                                    <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                </div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">City *</label>
                                        <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">State *</label>
                                        <select required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                            <option value="">Select State</option>
                                            <option value="CA">California</option>
                                            <option value="NY">New York</option>
                                            <option value="TX">Texas</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">ZIP Code *</label>
                                        <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    </div>
                                </div>
                                
                                <div class="flex justify-end">
                                    <button type="button" onclick="nextCheckoutStep(2)" class="bg-orange-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-orange-700 transition-colors">
                                        Continue to Payment
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Step 2: Payment Method -->
                    <div class="checkout-step" id="checkoutStep2">
                        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                            <h2 class="text-xl font-semibold text-gray-900 mb-6">Payment Method</h2>
                            
                            <div class="space-y-4 mb-6">
                                <div class="payment-method selected" onclick="selectPaymentMethod(this)">
                                    <div class="flex items-center">
                                        <input type="radio" name="payment" value="card" checked class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300">
                                        <div class="ml-3 flex items-center">
                                            <svg class="w-6 h-6 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                                            </svg>
                                            <span class="font-medium text-gray-900">Credit/Debit Card</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="payment-method" onclick="selectPaymentMethod(this)">
                                    <div class="flex items-center">
                                        <input type="radio" name="payment" value="paypal" class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300">
                                        <div class="ml-3 flex items-center">
                                            <svg class="w-6 h-6 text-blue-600 mr-2" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.26-.93 4.778-4.005 7.201-9.138 7.201h-2.19a.75.75 0 0 0-.741.63L7.17 19.875h4.78a.641.641 0 0 0 .633-.74l.034-.2.65-4.135.042-.23a.641.641 0 0 1 .633-.74h.398c3.66 0 6.526-1.49 7.36-5.797.348-1.8.166-3.302-.675-4.35Z"/>
                                            </svg>
                                            <span class="font-medium text-gray-900">PayPal</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="payment-method" onclick="selectPaymentMethod(this)">
                                    <div class="flex items-center">
                                        <input type="radio" name="payment" value="apple" class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300">
                                        <div class="ml-3 flex items-center">
                                            <svg class="w-6 h-6 text-gray-900 mr-2" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                                            </svg>
                                            <span class="font-medium text-gray-900">Apple Pay</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div id="cardDetails" class="space-y-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Card Number *</label>
                                    <input type="text" placeholder="1234 5678 9012 3456" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                </div>
                                
                                <div class="grid grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Expiry Date *</label>
                                        <input type="text" placeholder="MM/YY" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">CVV *</label>
                                        <input type="text" placeholder="123" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex justify-between">
                                <button type="button" onclick="prevCheckoutStep(1)" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium hover:bg-gray-400 transition-colors">
                                    Back to Shipping
                                </button>
                                <button type="button" onclick="nextCheckoutStep(3)" class="bg-orange-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-orange-700 transition-colors">
                                    Review Order
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Step 3: Order Review -->
                    <div class="checkout-step" id="checkoutStep3">
                        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                            <h2 class="text-xl font-semibold text-gray-900 mb-6">Review Your Order</h2>
                            
                            <!-- Order Summary -->
                            <div class="border border-gray-200 rounded-lg p-4 mb-6">
                                <h3 class="font-semibold text-gray-900 mb-4">Items</h3>
                                <div class="space-y-3">
                                    ${cart.map(item => `
                                        <div class="flex items-center gap-3">
                                            <img src="${item.image}" alt="${item.name}" class="w-12 h-12 object-cover rounded">
                                            <div class="flex-1">
                                                <h4 class="font-medium text-gray-900">${item.name}</h4>
                                                <p class="text-sm text-gray-500">Qty: ${item.quantity}</p>
                                            </div>
                                            <span class="font-semibold text-gray-900">$${(item.price * item.quantity).toFixed(2)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <!-- Final Total -->
                            <div class="border-t pt-4 mb-6">
                                <div class="flex justify-between text-lg font-semibold text-gray-900">
                                    <span>Total</span>
                                    <span>$${(cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.08).toFixed(2)}</span>
                                </div>
                            </div>
                            
                            <!-- Terms and Conditions -->
                            <div class="mb-6">
                                <label class="flex items-start">
                                    <input type="checkbox" required class="mt-1 h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300 rounded">
                                    <span class="ml-2 text-sm text-gray-700">
                                        I agree to the <a href="#" class="text-orange-600 hover:text-orange-700">Terms of Service</a> 
                                        and <a href="#" class="text-orange-600 hover:text-orange-700">Privacy Policy</a>
                                    </span>
                                </label>
                            </div>
                            
                            <div class="flex justify-between">
                                <button type="button" onclick="prevCheckoutStep(2)" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium hover:bg-gray-400 transition-colors">
                                    Back to Payment
                                </button>
                                <button type="button" onclick="completeOrder()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 transition-colors">
                                    Place Order
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function nextCheckoutStep(step) {
            // Hide current step
            document.querySelectorAll('.checkout-step').forEach(stepDiv => {
                stepDiv.classList.remove('active');
            });
            
            // Show next step
            document.getElementById(`checkoutStep${step}`).classList.add('active');
            
            // Update step indicators
            updateCheckoutStepIndicators(step);
        }
        
        function prevCheckoutStep(step) {
            // Hide current step
            document.querySelectorAll('.checkout-step').forEach(stepDiv => {
                stepDiv.classList.remove('active');
            });
            
            // Show previous step
            document.getElementById(`checkoutStep${step}`).classList.add('active');
            
            // Update step indicators
            updateCheckoutStepIndicators(step);
        }
        
        function updateCheckoutStepIndicators(currentStep) {
            document.querySelectorAll('.step-indicator').forEach((indicator, index) => {
                const stepNumber = index + 1;
                indicator.classList.remove('active', 'completed');
                
                if (stepNumber < currentStep) {
                    indicator.classList.add('completed');
                } else if (stepNumber === currentStep) {
                    indicator.classList.add('active');
                }
            });
        }
        
        function selectPaymentMethod(element) {
            // Remove selected class from all payment methods
            document.querySelectorAll('.payment-method').forEach(method => {
                method.classList.remove('selected');
            });
            
            // Add selected class to clicked method
            element.classList.add('selected');
            
            // Update radio button
            element.querySelector('input[type="radio"]').checked = true;
            
            // Show/hide card details based on selection
            const cardDetails = document.getElementById('cardDetails');
            const selectedValue = element.querySelector('input[type="radio"]').value;
            
            if (selectedValue === 'card') {
                cardDetails.style.display = 'block';
            } else {
                cardDetails.style.display = 'none';
            }
        }
        
        function completeOrder() {
            // Simulate order processing
            showNotification('Processing your order...', 'info');
            
            setTimeout(() => {
                // Clear cart
                cart = [];
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartDisplay();
                
                // Show success page
                document.getElementById('cartContent').innerHTML = createOrderSuccessHTML();
            }, 3000);
        }
        
        function createOrderSuccessHTML() {
            return `
                <div class="max-w-2xl mx-auto text-center">
                    <div class="success-animation bg-white rounded-lg shadow-md p-8">
                        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        
                        <h2 class="text-3xl font-bold text-gray-900 mb-4">Order Placed Successfully!</h2>
                        <p class="text-gray-600 mb-6">
                            Thank you for your purchase. Your order #ORD-2024-001 has been confirmed and will be processed shortly.
                        </p>
                        
                        <div class="bg-gray-50 rounded-lg p-6 mb-6">
                            <h3 class="font-semibold text-gray-900 mb-4">What's Next?</h3>
                            <div class="text-left space-y-2 text-sm text-gray-600">
                                <p>• You'll receive an email confirmation with your order details</p>
                                <p>• We'll notify you when your order ships</p>
                                <p>• You can track your order in your profile</p>
                                <p>• Sellers typically ship within 1-2 business days</p>
                            </div>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-4 justify-center">
                            <a href="profile.html" class="bg-orange-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-orange-700 transition-colors">
                                View Order Status
                            </a>
                            <a href="browse.html" class="border border-gray-300 text-gray-700 px-8 py-3 rounded-lg font-semibold hover:bg-gray-50 transition-colors">
                                Continue Shopping
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${
                type === 'success' ? 'bg-green-500' :
                type === 'error' ? 'bg-red-500' :
                'bg-blue-500'
            }`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Animate in
            if (typeof anime !== 'undefined') {
                anime({
                    targets: notification,
                    translateX: [300, 0],
                    opacity: [0, 1],
                    duration: 300,
                    easing: 'easeOutQuart'
                });
            }
            
            // Remove after 3 seconds
            setTimeout(() => {
                if (typeof anime !== 'undefined') {
                    anime({
                        targets: notification,
                        translateX: [0, 300],
                        opacity: [1, 0],
                        duration: 300,
                        easing: 'easeInQuart',
                        complete: () => notification.remove()
                    });
                } else {
                    notification.remove();
                }
            }, 3000);
        }
    </script>
    
    <!-- Main JavaScript -->
    <script src="main.js"></script>
</body>
</html>
